<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste JWT API</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        h2 {
            margin-top: 30px;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 100px;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            cursor: pointer;
        }

        .response {
            background: #f5f5f5;
            margin-top: 10px;
        }

        .status {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Teste de API JWT</h1>

<div class="card">
    <h2>Configuração</h2>

    <label>Host</label>
    <input
            type="text"
            id="host"
            value="http://localhost:8080">
</div>

<div class="card">
    <h2>1 - Endpoint Público</h2>

    <button onclick="testGreeting()">
        Testar GET /greeting
    </button>

    <div id="greetingStatus" class="status"></div>

    <label>Resposta</label>
    <textarea
            id="greetingResponse"
            class="response"
            readonly></textarea>
</div>

<div class="card">
    <h2>2 - Login</h2>

    <label>Email</label>
    <input
            type="email"
            id="email"
            placeholder="admin@email.com">

    <label>Password</label>
    <input
            type="password"
            id="password"
            placeholder="123456">

    <button onclick="login()">
        Obter JWT
    </button>

    <div id="loginStatus" class="status"></div>

    <label>JWT</label>
    <textarea
            id="jwt"></textarea>
</div>

<div class="card">
    <h2>3 - Endpoint Protegido</h2>

    <button onclick="testProtectedGreeting()">
        Testar GET /ws/greeting
    </button>

    <div id="protectedStatus" class="status"></div>

    <label>Resposta</label>
    <textarea
            id="protectedResponse"
            class="response"
            readonly></textarea>
</div>

<script>

    async function testGreeting() {

        const host = document.getElementById("host").value;

        try {

            const response = await fetch(
                `${host}/greeting`
            );

            const text = await response.text();

            document.getElementById("greetingStatus").innerText =
                `HTTP ${response.status}`;

            document.getElementById("greetingResponse").value =
                text;

        } catch (error) {

            document.getElementById("greetingStatus").innerText =
                "Erro";

            document.getElementById("greetingResponse").value =
                error.message;
        }
    }

    async function login() {

        const host = document.getElementById("host").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {

            const response = await fetch(
                `${host}/auth/signin`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                }
            );

            const text = await response.text();

            document.getElementById("loginStatus").innerText =
                `HTTP ${response.status}`;

            document.getElementById("jwt").value = text;

        } catch (error) {

            document.getElementById("loginStatus").innerText =
                "Erro";

            document.getElementById("jwt").value =
                error.message;
        }
    }

    async function testProtectedGreeting() {

        const host = document.getElementById("host").value;
        const jwt = document.getElementById("jwt").value;

        try {

            const response = await fetch(
                `${host}/ws/greeting`,
                {
                    headers: {
                        "Authorization": `Bearer ${jwt}`
                    }
                }
            );

            const text = await response.text();

            document.getElementById("protectedStatus").innerText =
                `HTTP ${response.status}`;

            document.getElementById("protectedResponse").value =
                text;

        } catch (error) {

            document.getElementById("protectedStatus").innerText =
                "Erro";

            document.getElementById("protectedResponse").value =
                error.message;
        }
    }

</script>

</body>
</html>
